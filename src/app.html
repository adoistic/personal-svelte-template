<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="color-scheme" content="light dark" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			rel="stylesheet"
			href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=IBM+Plex+Sans:ital,wght@0,300..700;1,300..700&display=swap"
		/>
		<script>
			// Apply stored theme before paint to avoid a flash of wrong colors.
			// Three values: 'light' | 'dark' | absent (system). The site otherwise
			// follows prefers-color-scheme via CSS.
			(function () {
				try {
					var t = localStorage.getItem('theme');
					if (t === 'light' || t === 'dark') {
						document.documentElement.dataset.theme = t;
					}
				} catch (_) {
					/* localStorage blocked — fall back to system */
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
