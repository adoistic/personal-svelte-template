<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="color-scheme" content="light dark" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			rel="stylesheet"
			href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=IBM+Plex+Sans:ital,wght@0,300..700;1,300..700&display=swap"
		/>
		<script>
			// Apply stored theme before paint to avoid a flash of wrong colors.
			// Three values: 'light' | 'dark' | absent (system). The site otherwise
			// follows prefers-color-scheme via CSS.
			(function () {
				try {
					var t = localStorage.getItem('theme');
					if (t === 'light' || t === 'dark') {
						document.documentElement.dataset.theme = t;
					}
				} catch (_) {
					/* localStorage blocked — fall back to system */
				}
			})();
		</script>
		<script>
			// Netlify Identity widget — loaded ONLY when the URL hash carries an
			// Identity token (email-confirmation, invite, or password-recovery
			// redirect). Regular visitors never download this. Once loaded, it
			// shows a modal, captures the token, and (on successful login)
			// redirects to /admin where Sveltia CMS takes over.
			(function () {
				if (
					typeof window !== 'undefined' &&
					window.location.hash &&
					/^#(confirmation|invite|recovery|email_change)_token=/.test(window.location.hash)
				) {
					var s = document.createElement('script');
					s.src = 'https://identity.netlify.com/v1/netlify-identity-widget.js';
					s.async = true;
					s.onload = function () {
						if (window.netlifyIdentity) {
							window.netlifyIdentity.on('login', function () {
								document.location.href = '/admin/';
							});
						}
					};
					document.head.appendChild(s);
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
