<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 480" role="img" aria-label="Book cover placeholder for The Quiet Sky">
	<defs>
		<linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
			<stop offset="0%" stop-color="#1a3a52" />
			<stop offset="100%" stop-color="#0b1f33" />
		</linearGradient>
	</defs>
	<rect width="320" height="480" fill="url(#bg1)" />
	<circle cx="160" cy="180" r="48" fill="#f4ede0" opacity="0.92" />
	<rect x="40" y="40" width="240" height="400" fill="none" stroke="#f4ede0" stroke-width="1" opacity="0.4" />
	<text x="160" y="320" text-anchor="middle" fill="#f4ede0" font-family="Georgia, serif" font-size="32" font-weight="300" letter-spacing="2">THE QUIET</text>
	<text x="160" y="360" text-anchor="middle" fill="#f4ede0" font-family="Georgia, serif" font-size="32" font-weight="300" letter-spacing="2">SKY</text>
	<text x="160" y="430" text-anchor="middle" fill="#f4ede0" font-family="Georgia, serif" font-size="13" font-style="italic" opacity="0.85">A novel by Avery Morrow</text>
</svg>
