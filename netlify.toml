[build]
  command = "bun run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "20"

# The /admin route is the Sveltia CMS app, served as plain static files.
# No special header needed; the default index.html serving works.

# Cache static assets aggressively, but never the HTML — content updates
# from the CMS need to take effect on the next deploy.
[[headers]]
  for = "/_app/immutable/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
